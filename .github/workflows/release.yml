name: Production Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  build-and-release:
    # Only run if the PR was merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all tags so we can check if the version exists

      # 1. Extract Version from PR Title (Handles v1.0, V1.0.1, etc.)
      - name: Extract version
        id: get_version
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          
          # Regex breakdown:
          # [vV] matches 'v' or 'V'
          # [0-9]+\.[0-9]+ matches the first two numbers (e.g., 1.0)
          # (\.[0-9]+)? makes the third dot and number optional
          VERSION=$(echo "$TITLE" | grep -oP '[vV][0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          
          if [ -z "$VERSION" ]; then
            echo "ERROR_MSG=No version pattern (e.g. v2.1 or V2.1.1) found in PR title." >> $GITHUB_ENV
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            # Normalize to lowercase 'v' for consistent tagging if desired, 
            # or keep as extracted:
            CLEAN_VERSION=$(echo "$VERSION" | tr 'A-Z' 'a-z')
            echo "VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
            echo "Found version: $CLEAN_VERSION"
          fi

      # 2. Check if Tag Already Exists
      - name: Check if tag exists
        id: check_tag
        if: env.SKIP_RELEASE == 'false'
        run: |
          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
            echo "Version ${{ env.VERSION }} already exists. Skipping build."
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      # 3. Setup Flutter (Only if version is new)
      - name: Setup Flutter
        if: env.SKIP_RELEASE == 'false' && env.TAG_EXISTS == 'false'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        if: env.SKIP_RELEASE == 'false' && env.TAG_EXISTS == 'false'
        run: flutter pub get

      # 4. Build the APK
      - name: Build APK
        if: env.SKIP_RELEASE == 'false' && env.TAG_EXISTS == 'false'
        run: flutter build apk --release

      # 5. Rename the APK
      - name: Rename Artifact
        if: env.SKIP_RELEASE == 'false' && env.TAG_EXISTS == 'false'
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/qread-universal.apk

      # 6. Create GitHub Release & Upload Asset
      - name: Create Release
        if: env.SKIP_RELEASE == 'false' && env.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/qread-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. Log why it skipped (Corrected Syntax)
      - name: Log skip reason
        if: env.SKIP_RELEASE == 'true' || env.TAG_EXISTS == 'true'
        run: |
          if [ "${{ env.SKIP_RELEASE }}" = "true" ]; then
            echo "Skipped: ${{ env.ERROR_MSG }}"
          elif [ "${{ env.TAG_EXISTS }}" = "true" ]; then
            echo "Skipped: Version ${{ env.VERSION }} already exists in tags."
          fi
